name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@88.222.213.235 "
            export PATH=/root/.nvm/versions/node/v20.19.5/bin:\$PATH &&
            cd /var/www/sunmoon_admin_pannel &&
            git stash &&
            GIT_SSH_COMMAND=\"ssh -i ~/.ssh/id_ed25519_deploy\" git pull origin main &&
            npm install &&
            npm run build &&
            if tmux has-session -t sunmoon_admin_pannel 2>/dev/null; then
              echo \"Already session running: sunmoon_admin_pannel. Killing it...\"
              tmux kill-session -t sunmoon_admin_pannel
            fi &&
            echo \"Starting new session: sunmoon_admin_pannel\" &&
            tmux new-session -d -s sunmoon_admin_pannel 'npm start -- -p 3005' &&
            echo \"Successfully started 'npm start -- -p 3005' in tmux session sunmoon_admin_pannel\"
          "
