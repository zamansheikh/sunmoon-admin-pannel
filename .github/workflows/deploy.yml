name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@88.222.213.235 "
            export PATH=/root/.nvm/versions/node/v20.19.5/bin:\$PATH &&
            cd /var/www/sunmoon-admin-pannel &&
            git stash &&
            GIT_SSH_COMMAND=\"ssh -i ~/.ssh/id_ed25519_deploy\" git pull origin main &&
            npm install &&
            npm run build &&
            pm2 delete sunmoon-admin-pannel || true &&
            pm2 start npm --name sunmoon-admin-pannel -- start &&
            pm2 save &&
            echo \"Successfully (re)started sunmoon-admin-pannel on port 3004 via pm2\"
          "
